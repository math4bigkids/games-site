<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATH TUTOR</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0b1a2f;color:white;overflow-x:hidden;}
h1{text-align:center;margin-bottom:30px;}
button, .menu-btn, .sound-btn, .tab, .play-btn{font-size:20px;font-weight:bold;padding:18px 40px;border-radius:12px;cursor:pointer;transition:transform .2s,box-shadow .2s;}
button:hover, .menu-btn:hover, .sound-btn:hover, .tab:hover, .play-btn:hover{transform:scale(1.05);box-shadow:0 0 20px #3a5fa9;}
.menu-btn{background:#3a5fa9;color:white;border:none;margin:20px;min-width:220px;}
.sound-btn{background:#ff4d4d;color:white;border:none;margin:5px;}
.tab{background:#1e3b6f;padding:5px 12px;display:flex;align-items:center;white-space:nowrap;}
.tab.active{background:#3a5fa9;}
.tab-close{margin-left:8px;color:#ff4d4d;cursor:pointer;font-size:16px;}
.browser-bar{display:flex;background:#162a4a;padding:6px;align-items:center;gap:5px;overflow-x:auto;display:none;position:relative;}
.address-bar{flex:2;position:relative;}
.address-bar input{width:100%;padding:6px;border-radius:5px;border:none;font-size:14px;}
#suggestions{position:absolute;background:#1e3b6f;width:100%;max-height:200px;overflow-y:auto;border-radius:5px;display:none;z-index:1000;}
#suggestions div{padding:8px 10px;cursor:pointer;border-bottom:1px solid #3a5fa9;transition:background .2s;}
#suggestions div:hover{background:#3a5fa9;}
iframe{width:100%;height:calc(100vh-50px);border:none;background:#0b1a2f;display:none;}
#settings{position:absolute;top:50px;right:10px;background:#162a4a;padding:10px;display:none;border-radius:8px;z-index:1000;}
#settings input[type="text"]{width:100%;margin-bottom:6px;padding:5px;border-radius:4px;border:none;}
#settings label{font-size:14px;}
#settings button{margin-top:6px;padding:6px 12px;border-radius:5px;border:none;background:#3a5fa9;color:white;cursor:pointer;}
.game-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px;}
.game-item{background:#1e3b6f;border-radius:10px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;padding-bottom:10px;}
.game-item:hover{transform:scale(1.05);box-shadow:0 0 12px #3a5fa9;}
.game-item img{width:100%;border-top-left-radius:10px;border-top-right-radius:10px;}
.game-item .title{font-weight:bold;margin:5px 0;font-size:14px;}
.game-item .desc{font-size:11px;padding:0 5px;}
#chatBox{height:250px;overflow-y:auto;background:#1e3b6f;padding:5px;border-radius:5px;margin-bottom:5px;}
#chatInput{width:70%;padding:6px;font-size:14px;}
</style>
</head>
<body>

<!-- START PAGE -->
<div id="startPage">
  <h1>MATH TUTOR</h1>
  <div style="text-align:center;">
    <button class="menu-btn" onclick="goSection('games')">🎮 Games</button>
    <button class="menu-btn" onclick="goSection('sound')">🔊 Soundboard</button>
    <button class="menu-btn" onclick="goSection('chat')">🤖 AI Chat</button>
    <button class="menu-btn" onclick="goSection('browser')">🌐 Proxee</button>
  </div>
</div>

<!-- Browser -->
<div class="browser-bar" id="browserBar">
  <button onclick="goBack()">◀</button>
  <button onclick="goForward()">▶</button>
  <div class="tabs" id="tabs"></div>
  <div class="address-bar">
    <input id="urlInput" placeholder="Search or enter URL..." oninput="showSuggestions(this.value)" onkeydown="if(event.key==='Enter') goURL()">
    <div id="suggestions"></div>
  </div>
  <button onclick="addTab()">➕</button>
  <button onclick="toggleSettings()">⚙️</button>
</div>

<iframe id="frame"></iframe>

<!-- SETTINGS -->
<div id="settings">
  <input id="panicLink" placeholder="Panic link"><br>
  <label><input type="checkbox" id="audioToggle" checked> Audio</label><br>
  <button onclick="saveSettings()">Save</button>
</div>

<script>
// ---------- Sections ----------
function goSection(section){
  document.getElementById("startPage").style.display="none";
  const f=document.getElementById("frame");
  f.style.display='block';
  document.getElementById("browserBar").style.display=section==='browser'?'flex':'none';
  if(section==='games') loadGames(f);
  if(section==='sound') loadSoundboard(f);
  if(section==='chat') loadChat(f);
  if(section==='browser') addTab('internal://browserStart','Start Page');
}

// ---------- Tabs ----------
let tabs=[],activeTab=0,historyMap={};
function addTab(url="internal://home",title="New Tab"){
  tabs.push({url,title});
  historyMap[tabs.length-1]=[url];
  renderTabs();
  switchTab(tabs.length-1);
}
function renderTabs(){
  const c=document.getElementById("tabs"); c.innerHTML="";
  tabs.forEach((t,i)=>{
    const el=document.createElement("div");
    el.className="tab"+(i===activeTab?" active":"");
    el.innerHTML=`${t.title}<span class="tab-close" onclick="closeTab(event,${i})">x</span>`;
    el.onclick=()=>switchTab(i);
    c.appendChild(el);
  });
}
function switchTab(i){activeTab=i; renderTabs(); loadPage(tabs[i].url);}
function closeTab(e,i){e.stopPropagation(); tabs.splice(i,1); delete historyMap[i]; if(tabs.length===0) addTab(); else switchTab(Math.max(0,i-1));}

// ---------- Browser Navigation ----------
function goURL(){
  let val=document.getElementById("urlInput").value;
  if(!val.includes(".")) val="https://duckduckgo.com/?q="+encodeURIComponent(val);
  else if(!val.startsWith("http")) val="https://"+val;
  tabs[activeTab].url=val;
  historyMap[activeTab].push(val);
  loadPage(val);
}
function goBack(){
  if(historyMap[activeTab].length>1){
    historyMap[activeTab].pop();
    tabs[activeTab].url = historyMap[activeTab][historyMap[activeTab].length-1];
    loadPage(tabs[activeTab].url);
  }
}
function goForward(){alert("Forward button works when implemented with history stack.");}
function loadPage(url){
  const f=document.getElementById("frame");
  if(url==='internal://browserStart'){
    f.srcdoc=`<div style="padding:20px;text-align:center;color:white;">
      <h2>Welcome to Proxee!</h2>
      <p>Type a site or search above to start browsing.</p>
    </div>`;
  } else f.src=url;
}

// ---------- Search Suggestions ----------
function showSuggestions(query){
  const sug=document.getElementById("suggestions");
  if(!query) {sug.style.display="none"; sug.innerHTML=""; return;}
  const sampleResults=[
    {title:"DuckDuckGo", url:"https://duckduckgo.com/?q="+encodeURIComponent(query)},
    {title:"Google", url:"https://www.google.com/search?q="+encodeURIComponent(query)},
    {title:"Wikipedia", url:"https://en.wikipedia.org/wiki/"+encodeURIComponent(query)},
    {title:"YouTube", url:"https://www.youtube.com/results?search_query="+encodeURIComponent(query)}
  ];
  sug.innerHTML="";
  sampleResults.forEach(r=>{
    const div=document.createElement("div");
    div.textContent=r.title;
    div.onclick=()=>{document.getElementById("urlInput").value=r.title; loadPage(r.url); sug.style.display="none";};
    sug.appendChild(div);
  });
  sug.style.display="block";
}
document.addEventListener("click",e=>{const sug=document.getElementById("suggestions"); if(!document.getElementById("urlInput").contains(e.target)) sug.style.display="none";});

// ---------- Games ----------
const gamesData = [
  {category:"Sports",title:"Retro Bowl",desc:"Football fun!",url:"https://www.crazygames.com/game/retro-bowl",img:"https://static.crazygames.com/retro-bowl/cover.jpg"},
  {category:"Sports",title:"Basketball Stars",desc:"Shoot hoops!",url:"https://www.crazygames.com/game/basketball-stars",img:"https://static.crazygames.com/basketball-stars/cover.jpg"},
  {category:"Sports",title:"Soccer Physics",desc:"Fun soccer levels!",url:"https://www.crazygames.com/game/soccer-physics",img:"https://static.crazygames.com/soccer-physics/cover.jpg"},
  {category:"Sports",title:"Golf Orbit",desc:"360° golf madness!",url:"https://www.crazygames.com/game/golf-orbit",img:"https://static.crazygames.com/golf-orbit/cover.jpg"},
  {category:"Driving",title:"Moto X3M",desc:"Extreme bike racing!",url:"https://www.crazygames.com/game/moto-x3m",img:"https://static.crazygames.com/moto-x3m/cover.jpg"},
  {category:"Action",title:"Rooftop Snipers",desc:"Shoot enemies!",url:"https://www.crazygames.com/game/rooftop-snipers",img:"https://static.crazygames.com/rooftop-snipers/cover.jpg"},
  {category:"Puzzle",title:"Sugar, Sugar",desc:"Draw lines to guide sugar",url:"https://www.crazygames.com/game/sugar-sugar",img:"https://static.crazygames.com/sugar-sugar/cover.jpg"},
  {category:"Arcade",title:"Paper.io 2",desc:"Conquer territory!",url:"https://www.crazygames.com/game/paper-io-2",img:"https://static.crazygames.com/paper-io-2/cover.jpg"}
  // Add more games here up to 50+ per category
];

function loadGames(f){
  let html='<div style="padding:10px;">';
  const categories = [...new Set(gamesData.map(g=>g.category))];
  categories.forEach(cat=>{
    html+=`<h2>${cat}</h2><div class="game-grid">`;
    gamesData.filter(g=>g.category===cat).forEach(g=>{
      html+=`<div class="game-item">
        <img src="${g.img}" alt="${g.title}">
        <div class="title">${g.title}</div>
        <div class="desc">${g.desc}</div>
        <button class="play-btn" onclick="launchGame('${g.url}')">Play</button>
      </div>`;
    });
    html+='</div>';
  });
  html+='<button onclick="goSection(\'start\')">⬅ Back</button></div>';
  f.srcdoc=html;
}
function launchGame(url){document.getElementById("frame").src=url;}

// ---------- Soundboard ----------
function loadSoundboard(f){
  f.srcdoc=`<div style="padding:20px;"><h2>🔊 Soundboard</h2>
    <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/vine-boom.mp3')">Vine Boom</button>
    <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/airhorn.mp3')">Airhorn</button>
    <button class="sound-btn" onclick="playSound('https://www.myinstants.com/media/sounds/fart.mp3')">Fart</button><br><br>
    <button onclick="goSection('start')">⬅ Back</button></div>`;
}
function playSound(url){if(localStorage.getItem("audio")==="false") return; new Audio(url).play();}

// ---------- AI CHAT ----------
function loadChat(f){
  f.srcdoc=`<div style="padding:10px;">
    <h2>🤖 AI Chat</h2>
    <div id="chatBox"></div>
    <input id="chatInput" placeholder="Ask me anything..."><button onclick="chatSend()">Send</button>
    <button onclick="goSection('start')">⬅ Back</button>
  </div>`;
}
async function chatSend(){
  const doc=document.getElementById("frame").contentWindow.document;
  const input=doc.getElementById("chatInput");
  const box=doc.getElementById("chatBox");
  const userMsg=input.value.trim();
  if(!userMsg) return;
  box.innerHTML+=`<div><b>You:</b> ${userMsg}</div>`;
  input.value=""; box.scrollTop=box.scrollHeight;
  try{
    const res=await fetch('https://YOUR-REPLIT-BACKEND-URL/chat',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:userMsg})
    });
    const data=await res.json();
    box.innerHTML+=`<div><b>AI:</b> ${data.answer}</div>`;
    box.scrollTop=box.scrollHeight;
  }catch(err){box.innerHTML+=`<div><b>AI:</b> Error fetching answer</div>`;}
}

// ---------- Settings ----------
function toggleSettings(){const s=document.getElementById("settings"); s.style.display=s.style.display==="block"?"none":"block";}
function saveSettings(){localStorage.setItem("panic",document.getElementById("panicLink").value); localStorage.setItem("audio",document.getElementById("audioToggle").checked); alert("Saved");}

// ---------- Panic ----------
document.addEventListener("keydown",e=>{if(e.key==="Escape"){const link=localStorage.getItem("panic"); if(link) window.location.href=link;}});
</script>

</body>
</html>
