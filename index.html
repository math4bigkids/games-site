<!DOCTYPE html>
<html>
<head>
    <title>Ultimate Games Hub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        header {
            background: #020617;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        input {
            width: 60%;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        .games {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .game {
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }

        .game:hover {
            transform: scale(1.05);
        }

        .game img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .game p {
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>🎮 Ultimate Games Hub</h1>
    <input type="text" id="search" placeholder="Search games..." onkeyup="searchGames()">
</header>

<div class="games" id="gameList"></div>

<h2 style="text-align:center;">🔊 Soundboard</h2>
<div style="text-align:center;">
    <button onclick="play('vine')">Vine Boom</button>
    <button onclick="play('airhorn')">Airhorn</button>
    <button onclick="play('bruh')">Bruh</button>
    <button onclick="play('laugh')">Laugh</button>
    <button onclick="play('wow')">WOW</button>
    <button onclick="play('boom')">Explosion</button>
</div>

<script>
// GAME DATABASE (you can grow this to 100s easily)
const games = [
    {name:"Slope", url:"https://slopegame.io", img:"https://img.itch.zone/aW1nLzE0NDQzODU.png"},
    {name:"Retro Bowl", url:"https://retro-bowl.io", img:"https://img.itch.zone/aW1nLzE0NDQzODU.png"},
    {name:"Golf Orbit", url:"https://golforbit.io", img:"https://img.itch.zone/aW1nLzE0NDQzODU.png"},
    {name:"1v1.LOL", url:"https://1v1.lol", img:"https://img.itch.zone/aW1nLzE0NDQzODU.png"},
    {name:"Krunker", url:"https://krunker.io", img:"https://img.itch.zone/aW1nLzE0NDQzODU.png"},
    {name:"Shell Shockers", url:"https://shellshock.io", img:"https://img.itch.zone/aW1nLzE0NDQzODU.png"},
    {name:"Tetris", url:"https://tetris.com/play-tetris", img:"https://img.itch.zone/aW1nLzE0NDQzODU.png"},
    {name:"2048", url:"https://play2048.co", img:"https://img.itch.zone/aW1nLzE0NDQzODU.png"}
];

// LOAD GAMES
function loadGames(list) {
    let html = "";
    list.forEach(g => {
        html += `
        <div class="game" onclick="window.open('${g.url}','_blank')">
            <img src="${g.img}">
            <p>${g.name}</p>
        </div>`;
    });
    document.getElementById("gameList").innerHTML = html;
}

loadGames(games);

// SEARCH
function searchGames() {
    let input = document.getElementById("search").value.toLowerCase();
    let filtered = games.filter(g => g.name.toLowerCase().includes(input));
    loadGames(filtered);
}

// SOUNDS
function play(type){
    let sounds={
        vine:"https://www.myinstants.com/media/sounds/vine-boom.mp3",
        airhorn:"https://www.myinstants.com/media/sounds/airhorn.mp3",
        bruh:"https://www.myinstants.com/media/sounds/movie_1.mp3",
        laugh:"https://www.myinstants.com/media/sounds/laugh.mp3",
        wow:"https://www.myinstants.com/media/sounds/wow.mp3",
        boom:"https://www.myinstants.com/media/sounds/explosion.mp3"
    };
    new Audio(sounds[type]).play();
}
</script>

</body>
</html>
