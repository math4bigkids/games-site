<!DOCTYPE html>
<html>
<head>
    <title>Ultimate Games Hub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        header {
            background: #020617;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        input {
            width: 60%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
        }

        .games {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .game {
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }

        .game:hover {
            transform: scale(1.05);
        }

        .game img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .game p {
            padding: 10px;
        }

        #player {
            padding: 20px;
        }

        iframe {
            width: 100%;
            height: 80vh;
            border: none;
            border-radius: 10px;
        }

        .fullscreen-btn {
            margin-top: 10px;
            padding: 10px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button {
            margin: 5px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>🎮 Ultimate Games Hub</h1>
    <input type="text" id="search" placeholder="Search games..." onkeyup="searchGames()">
</header>

<div class="games" id="gameList">

<!-- EMBED GAMES -->
<div class="game" onclick="playGame('https://html5games.com/Game/Helix-Jump/')"><img src="https://picsum.photos/300/200?1"><p>Helix Jump</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Stack/')"><img src="https://picsum.photos/300/200?2"><p>Stack</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Snake/')"><img src="https://picsum.photos/300/200?3"><p>Snake</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Tetris/')"><img src="https://picsum.photos/300/200?4"><p>Tetris</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/2048/')"><img src="https://picsum.photos/300/200?5"><p>2048</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Pac-Man/')"><img src="https://picsum.photos/300/200?6"><p>Pacman</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Breakout/')"><img src="https://picsum.photos/300/200?7"><p>Breakout</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Flappy-Bird/')"><img src="https://picsum.photos/300/200?8"><p>Flappy Bird</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Chess/')"><img src="https://picsum.photos/300/200?9"><p>Chess</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Sudoku/')"><img src="https://picsum.photos/300/200?10"><p>Sudoku</p></div>

<!-- POPULAR GAMES -->
<div class="game" onclick="window.open('https://slopegame.io','_blank')"><img src="https://picsum.photos/300/200?11"><p>Slope</p></div>
<div class="game" onclick="window.open('https://retro-bowl.io','_blank')"><img src="https://picsum.photos/300/200?12"><p>Retro Bowl</p></div>
<div class="game" onclick="window.open('https://golforbit.io','_blank')"><img src="https://picsum.photos/300/200?13"><p>Golf Orbit</p></div>

<!-- EXTRA GAMES -->
<div class="game" onclick="playGame('https://html5games.com/Game/Minesweeper/')"><img src="https://picsum.photos/300/200?14"><p>Minesweeper</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Checkers/')"><img src="https://picsum.photos/300/200?15"><p>Checkers</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Pinball/')"><img src="https://picsum.photos/300/200?16"><p>Pinball</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Pool/')"><img src="https://picsum.photos/300/200?17"><p>Pool</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Bowling/')"><img src="https://picsum.photos/300/200?18"><p>Bowling</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Basketball/')"><img src="https://picsum.photos/300/200?19"><p>Basketball</p></div>
<div class="game" onclick="playGame('https://html5games.com/Game/Golf/')"><img src="https://picsum.photos/300/200?20"><p>Golf</p></div>

</div>

<div id="player"></div>

<!-- SOUNDBOARD -->
<h2 style="text-align:center;">🔊 Soundboard</h2>

<div style="text-align:center; padding:20px;">
    <button onclick="playSound('vine')">Vine Boom</button>
    <button onclick="playSound('airhorn')">Airhorn</button>
    <button onclick="playSound('bruh')">Bruh</button>
    <button onclick="playSound('laugh')">Laugh</button>
</div>

<script>
function playGame(url) {
    document.getElementById("player").innerHTML = `
        <iframe src="${url}"></iframe>
        <br>
        <button class="fullscreen-btn" onclick="goFullscreen()">Fullscreen</button>
    `;
    window.scrollTo(0, document.body.scrollHeight);
}

function searchGames() {
    let input = document.getElementById("search").value.toLowerCase();
    let games = document.getElementsByClassName("game");

    for (let i = 0; i < games.length; i++) {
        let title = games[i].innerText.toLowerCase();
        games[i].style.display = title.includes(input) ? "block" : "none";
    }
}

function goFullscreen() {
    let iframe = document.querySelector("iframe");
    if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
    }
}

function playSound(type) {
    let sounds = {
        vine: "https://www.myinstants.com/media/sounds/vine-boom.mp3",
        airhorn: "https://www.myinstants.com/media/sounds/airhorn.mp3",
        bruh: "https://www.myinstants.com/media/sounds/movie_1.mp3",
        laugh: "https://www.myinstants.com/media/sounds/laugh.mp3"
    };

    let audio = new Audio(sounds[type]);
    audio.play();
}
</script>

</body>
</html>
