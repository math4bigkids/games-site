<!DOCTYPE html>
<html>
<head>
<title>GAMEHUB</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:70px;
background:#020617;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-top:10px;
}
.icon{
margin:15px;
cursor:pointer;
font-size:20px;
opacity:.7;
}
.icon:hover{opacity:1;}

/* MAIN */
.main{
flex:1;
padding:15px;
}

/* SEARCH */
.search{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
margin-bottom:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:15px;
}
.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.2s;
}
.card:hover{transform:scale(1.05);}
.card img{
width:100%;
height:100px;
object-fit:cover;
}
.card p{
text-align:center;
padding:5px;
font-size:13px;
}

/* IFRAME */
iframe{
width:100%;
height:90vh;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="icon" onclick="showHome()">🏠</div>
<div class="icon" onclick="showGames()">🎮</div>
<div class="icon" onclick="showBrowser()">🌐</div>
</div>

<!-- MAIN -->
<div class="main" id="main"></div>

<script>

// 🔥 PUT YOUR PROXY HERE
const proxy="https://uv.kdhub.dev/service/";

// ================= HOME =================
function showHome(){
document.getElementById("main").innerHTML=`
<h1>GAMEHUB</h1>
<p>Ultimate Games + Browser</p>
`;
}
showHome();

// ================= GAMES =================
const games=[

// 🔥 FUN GAMES
{name:"Slope",url:"https://www.crazygames.com/embed/slope",img:"https://img.crazygames.com/games/slope/cover-1653297102740.png"},
{name:"Retro Bowl",url:"https://www.crazygames.com/embed/retro-bowl",img:"https://img.crazygames.com/games/retro-bowl/cover-1588767167680.png"},
{name:"Basketball Stars",url:"https://www.crazygames.com/embed/basketball-stars",img:"https://img.crazygames.com/games/basketball-stars/cover-1588165025964.png"},
{name:"Soccer Skills",url:"https://www.crazygames.com/embed/soccer-skills-world-cup",img:"https://img.crazygames.com/games/soccer-skills-world-cup/cover-1669802873150.png"},
{name:"Stickman Hook",url:"https://www.crazygames.com/embed/stickman-hook",img:"https://img.crazygames.com/games/stickman-hook/cover-1643293880622.png"},
{name:"Subway Surfers",url:"https://www.crazygames.com/embed/subway-surfers",img:"https://img.crazygames.com/games/subway-surfers/cover-1682333601097.png"},
{name:"Run 3",url:"https://www.crazygames.com/embed/run-3",img:"https://img.crazygames.com/games/run-3/cover-1588164679560.png"},
{name:"FNF",url:"https://www.crazygames.com/embed/friday-night-funkin",img:"https://img.crazygames.com/games/friday-night-funkin/cover-1616166737121.png"},

// 🔥 FNAF
{name:"FNAF 1",url:"https://www.crazygames.com/embed/five-nights-at-freddys",img:"https://i.imgur.com/8QZ7Z9y.png"},
{name:"FNAF 2",url:"https://www.crazygames.com/embed/five-nights-at-freddys-2",img:"https://i.imgur.com/FNAF2.png"},
{name:"FNAF 3",url:"https://www.crazygames.com/embed/five-nights-at-freddys-3",img:"https://i.imgur.com/FNAF3.png"},
{name:"FNAF 4",url:"https://www.crazygames.com/embed/five-nights-at-freddys-4",img:"https://i.imgur.com/FNAF4.png"},

// 🔥 VEX SERIES
{name:"Vex 3",url:"https://www.crazygames.com/embed/vex-3",img:"https://img.crazygames.com/games/vex-3/cover-1588164606520.png"},
{name:"Vex 4",url:"https://www.crazygames.com/embed/vex-4",img:"https://img.crazygames.com/games/vex-4/cover-1588164629286.png"},
{name:"Vex 5",url:"https://www.crazygames.com/embed/vex-5",img:"https://img.crazygames.com/games/vex-5/cover-1588164647863.png"},
{name:"Vex 6",url:"https://www.crazygames.com/embed/vex-6",img:"https://img.crazygames.com/games/vex-6/cover-1588164666004.png"},

// 🔥 RANDOM FUN
{name:"Crossy Road",url:"https://www.crazygames.com/embed/crossy-road",img:"https://img.crazygames.com/games/crossy-road/cover-1588165069413.png"},
{name:"Temple Run 2",url:"https://www.crazygames.com/embed/temple-run-2",img:"https://img.crazygames.com/games/temple-run-2/cover-1588165001390.png"},
{name:"Helix Jump",url:"https://www.crazygames.com/embed/helix-jump",img:"https://img.crazygames.com/games/helix-jump/cover-1588165077716.png"},
{name:"Bottle Flip 3D",url:"https://www.crazygames.com/embed/bottle-flip-3d",img:"https://img.crazygames.com/games/bottle-flip-3d/cover-1588165096866.png"},

];

// LOAD GAME PAGE
function showGames(){
let html=`<input class="search" placeholder="Search games..." onkeyup="filter(this.value)">
<div class="grid">`;

games.forEach(g=>{
html+=`
<div class="card" onclick="play('${g.url}')">
<img src="${g.img}">
<p>${g.name}</p>
</div>`;
});

html+=`</div>`;
document.getElementById("main").innerHTML=html;
}

// FILTER
function filter(val){
val=val.toLowerCase();
let cards=document.querySelectorAll(".card");
cards.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
}

// PLAY GAME
function play(url){
document.getElementById("main").innerHTML=
`<button onclick="showGames()">⬅ Back</button>
<iframe src="${url}"></iframe>`;
}

// ================= BROWSER =================
function showBrowser(){
document.getElementById("main").innerHTML=`
<input class="search" id="url" placeholder="Search or enter URL">
<button onclick="go()">Go</button>
<iframe id="frame"></iframe>
`;
}

function go(){
let val=document.getElementById("url").value;
if(!val.startsWith("http")){
val="https://duckduckgo.com/?q="+encodeURIComponent(val);
}
document.getElementById("frame").src=proxy+btoa(val);
}

</script>

</body>
</html>
