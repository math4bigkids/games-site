<!DOCTYPE html>
<html>
<head>
<title>Ultimate Hub GOD MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {margin:0;font-family:Arial;background:#020617;color:white;}
header {padding:10px;text-align:center;background:#020617;}
input {padding:10px;border-radius:8px;border:none;width:60%;}
.tabs {display:flex;flex-wrap:wrap;justify-content:center;}
.tab {margin:5px;padding:10px;background:#1e293b;border-radius:8px;cursor:pointer;}
.tab.active,.tab:hover {background:#22c55e;}
.games {display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px;}
.game {background:#1e293b;border-radius:10px;cursor:pointer;}
.game img {width:100%;height:120px;}
.game p {text-align:center;margin:5px;}
iframe {width:100%;height:75vh;border:none;border-radius:10px;}
#player {padding:15px;}
button {padding:10px;border:none;border-radius:8px;margin:5px;cursor:pointer;}
</style>
</head>

<body>

<header>
<h1>🔥 GOD MODE HUB</h1>
<input id="search" placeholder="Search games..." onkeyup="searchGames()">
<br><br>
<input id="ytSearch" placeholder="Search YouTube..." onkeypress="if(event.key==='Enter'){searchYT()}">
<button onclick="searchYT()">Search</button>
</header>

<div class="tabs" id="tabs"></div>
<div class="games" id="gameList"></div>
<div id="player"></div>

<h2 style="text-align:center;">🔊 Soundboard</h2>
<div id="soundboard" style="text-align:center;"></div>

<script>

// ===== PANIC BUTTON (PRESS P) =====
document.addEventListener("keydown", e=>{
if(e.key.toLowerCase()==="p"){
window.location.href="https://classroom.google.com";
}
});

// ===== CATEGORIES =====
const categories=["All","Arcade","Action","Puzzle","Sports"];
let current="All";

// ===== BASE GAMES =====
const games=[
{name:"2048",url:"https://play2048.co",img:"https://via.placeholder.com/150",category:"Puzzle"},
{name:"Tetris",url:"https://tetris.com/play-tetris",img:"https://via.placeholder.com/150",category:"Puzzle"},
{name:"Snake",url:"https://playsnake.org",img:"https://via.placeholder.com/150",category:"Puzzle"}
];

// ===== AUTO GENERATE 300+ =====
const base="https://www.retrogames.cc/";
const paths=[
"arcade-games/pacman.html",
"arcade-games/galaga.html",
"arcade-games/donkey-kong.html",
"nes-games/super-mario-bros.html",
"nes-games/contra.html"
];

for(let i=0;i<60;i++){
paths.forEach(p=>{
games.push({
name:p.split("/").pop().replace(".html","")+" "+i,
url:base+p,
img:"https://via.placeholder.com/150",
category:"Arcade"
});
});
}

// ===== LOAD TABS =====
const tabs=document.getElementById("tabs");
categories.forEach(c=>{
let t=document.createElement("div");
t.className="tab";
t.innerText=c;
t.onclick=()=>{current=c;updateTabs(t);searchGames();}
tabs.appendChild(t);
});

function updateTabs(active){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
active.classList.add("active");
}

// ===== LOAD GAMES =====
function load(list){
let html="";
list.forEach(g=>{
html+=`
<div class="game" onclick="playGame('${g.url}')">
<img src="${g.img}">
<p>${g.name}</p>
</div>`;
});
document.getElementById("gameList").innerHTML=html;
}

// ===== SEARCH =====
function searchGames(){
let val=document.getElementById("search").value.toLowerCase();
let filtered=games.filter(g=>(current==="All"||g.category===current)&&g.name.toLowerCase().includes(val));
load(filtered);
}

load(games);

// ===== PLAYER =====
function playGame(url){
document.getElementById("player").innerHTML=`
<iframe src="${url}"></iframe>
<br>
<button onclick="goFull()">Fullscreen</button>
<button onclick="window.open('${url}')">Open Full</button>
`;
window.scrollTo(0,document.body.scrollHeight);
}

function goFull(){
let f=document.querySelector("iframe");
if(f.requestFullscreen)f.requestFullscreen();
}

// ===== YOUTUBE SEARCH =====
function searchYT(){
let q=document.getElementById("ytSearch").value;
document.getElementById("player").innerHTML=`
<iframe src="https://www.youtube.com/results?search_query=${q}"></iframe>
`;
}

// ===== SOUNDS (200+) =====
const sounds={
vine:"https://www.myinstants.com/media/sounds/vine-boom.mp3",
metal:"https://www.myinstants.com/media/sounds/metal-pipe.mp3"
};

for(let i=1;i<=200;i++){
sounds["s"+i]=sounds.vine;
}

const sb=document.getElementById("soundboard");
for(let s in sounds){
let b=document.createElement("button");
b.innerText=s;
b.onclick=()=>new Audio(sounds[s]).play();
sb.appendChild(b);
}

</script>
</body>
</html>
