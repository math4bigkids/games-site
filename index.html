<!DOCTYPE html>
<html>
<head>
<title>GOD MODE FUN HUB</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#0b0c1f;color:white;}
header{text-align:center;padding:10px;}
input{padding:10px;border-radius:8px;border:none;width:60%;}
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px;}
.game{background:#1e293b;border-radius:10px;cursor:pointer;overflow:hidden;}
.game img{width:100%;height:120px;}
.tabs{display:flex;justify-content:center;flex-wrap:wrap;}
.tab{margin:5px;padding:10px;background:#1e293b;border-radius:8px;cursor:pointer;}
.tab.active{background:#22c55e;}
iframe{width:100%;height:75vh;border:none;border-radius:10px;}
#player{padding:10px;}
#gear{position:fixed;top:10px;right:10px;font-size:24px;cursor:pointer;}
#settings{position:fixed;top:50px;right:10px;background:#111;padding:10px;border-radius:10px;display:none;}
button{padding:8px;margin:5px;border:none;border-radius:8px;cursor:pointer;}
</style>
</head>

<body>

<div id="gear" onclick="toggleSettings()">⚙️</div>

<div id="settings">
<h3>Settings</h3>
Panic Key:<br><input id="panicKey"><br>
Panic URL:<br><input id="panicURL"><br>
<button onclick="toggleSound()">Toggle Sound</button>
</div>

<header>
<h1>🔥 GOD MODE HUB</h1>
<input id="search" placeholder="Search games..." onkeyup="searchGames()"><br><br>

<input id="browserInput" placeholder="Search or enter URL">
<button onclick="openBrowser()">GO</button>
</header>

<div class="tabs">
<div class="tab active" onclick="setCat('All',this)">All</div>
<div class="tab" onclick="setCat('Sports',this)">Sports</div>
<div class="tab" onclick="setCat('Fun',this)">Fun</div>
</div>

<div class="games" id="games"></div>
<div id="player"></div>

<h2 style="text-align:center;">🔊 Soundboard</h2>
<div id="sounds" style="text-align:center;"></div>

<script>

// SETTINGS
let soundOn=true;

// PANIC BUTTON
document.addEventListener("keydown",e=>{
if(e.key===document.getElementById("panicKey").value){
location.href=document.getElementById("panicURL").value||"https://google.com";
}
});

// SETTINGS TOGGLE
function toggleSettings(){
let s=document.getElementById("settings");
s.style.display=s.style.display==="block"?"none":"block";
}

// SOUND TOGGLE
function toggleSound(){
soundOn=!soundOn;
alert("Sound: "+(soundOn?"ON":"OFF"));
}

// GAMES
let category="All";

const games=[
{name:"Basketball Stars",url:"https://www.crazygames.com/embed/basketball-stars",cat:"Sports"},
{name:"Soccer Skills",url:"https://www.crazygames.com/embed/soccer-skills-world-cup",cat:"Sports"},
{name:"Football Legends",url:"https://www.crazygames.com/embed/football-legends",cat:"Sports"},
{name:"Golf Orbit",url:"https://www.crazygames.com/embed/golf-orbit",cat:"Sports"},
{name:"Retro Bowl",url:"https://www.crazygames.com/embed/retro-bowl",cat:"Sports"},

{name:"Slope",url:"https://www.crazygames.com/embed/slope",cat:"Fun"},
{name:"Run 3",url:"https://www.crazygames.com/embed/run-3",cat:"Fun"},
{name:"Subway Surfers",url:"https://www.crazygames.com/embed/subway-surfers",cat:"Fun"},
{name:"Stickman Hook",url:"https://www.crazygames.com/embed/stickman-hook",cat:"Fun"},
{name:"FNF",url:"https://www.crazygames.com/embed/friday-night-funkin",cat:"Fun"},
{name:"Among Us",url:"https://www.crazygames.com/embed/impostor",cat:"Fun"}
];

// LOAD GAMES
function loadGames(){
let html="";
games.forEach(g=>{
if(category==="All"||g.cat===category){
html+=`<div class="game" onclick="play('${g.url}')">
<img src="https://via.placeholder.com/150">
<p>${g.name}</p></div>`;
}
});
document.getElementById("games").innerHTML=html;
}
loadGames();

// SEARCH
function searchGames(){
let val=document.getElementById("search").value.toLowerCase();
let html="";
games.forEach(g=>{
if(g.name.toLowerCase().includes(val)){
html+=`<div class="game" onclick="play('${g.url}')">
<img src="https://via.placeholder.com/150">
<p>${g.name}</p></div>`;
}
});
document.getElementById("games").innerHTML=html;
}

// CATEGORY
function setCat(c,el){
category=c;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
loadGames();
}

// PLAYER
function play(url){
document.getElementById("player").innerHTML=`<iframe src="${url}"></iframe>`;
}

// 🌐 PROXY BROWSER (Ultraviolet public proxy)
function openBrowser(){
let input=document.getElementById("browserInput").value;
if(!input.startsWith("http")){
input="https://duckduckgo.com/?q="+encodeURIComponent(input);
}
document.getElementById("player").innerHTML=
`<iframe src="https://uv.kdhub.dev/service/${btoa(input)}"></iframe>`;
}

// 🔊 SOUNDS
const soundList=[
"https://www.myinstants.com/media/sounds/vine-boom.mp3",
"https://www.myinstants.com/media/sounds/metal-pipe.mp3",
"https://www.myinstants.com/media/sounds/airhorn.mp3",
"https://www.myinstants.com/media/sounds/movie_1.mp3"
];

const soundDiv=document.getElementById("sounds");
soundList.forEach(s=>{
let b=document.createElement("button");
b.innerText="🔊";
b.onclick=()=>{if(soundOn)new Audio(s).play();};
soundDiv.appendChild(b);
});

</script>

</body>
</html>
