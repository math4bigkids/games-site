<!DOCTYPE html>
<html>
<head>
<title>Math Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;display:flex}

/* SIDEBAR */
.sidebar{
width:70px;background:#020617;height:100vh;
display:flex;flex-direction:column;align-items:center;padding-top:10px;
}
.icon{margin:15px;font-size:20px;cursor:pointer;opacity:.7}
.icon:hover{opacity:1}

/* MAIN */
.main{flex:1;padding:15px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:15px;
}
.card{
background:#1e293b;border-radius:12px;
padding:10px;text-align:center;
cursor:pointer;transition:.2s;
}
.card:hover{transform:scale(1.05)}

/* SOUNDBOARD */
.sound{
width:70px;height:70px;border-radius:50%;
background:red;display:flex;
align-items:center;justify-content:center;
cursor:pointer;font-size:12px;text-align:center;
}

/* BROWSER */
iframe{width:100%;height:90vh;border:none;border-radius:10px}
</style>
</head>

<body>

<div class="sidebar">
<div class="icon" onclick="showHome()">🏠</div>
<div class="icon" onclick="showGames()">🎮</div>
<div class="icon" onclick="showBrowser()">🌐</div>
<div class="icon" onclick="showSound()">🔊</div>
</div>

<div class="main" id="main"></div>

<script>

// 🔥 PROXY
const proxy="https://uv.kdhub.dev/service/";

// ================= HOME =================
function showHome(){
main.innerHTML=`<h1>Math Hub</h1><p>Games + Browser + Soundboard</p>`;
}
showHome();

// ================= GAMES =================
const categories = {

"Horror 👻":[
{name:"FNAF 1",url:"https://fnaf-online.github.io/fnaf1/"},
{name:"FNAF 2",url:"https://fnaf-online.github.io/fnaf2/"},
{name:"FNAF 3",url:"https://fnaf-online.github.io/fnaf3/"},
{name:"Baldi Basics",url:"https://baldisbasicsgame.io"},
{name:"Granny",url:"https://grannygame.io"}
],

"Trending 🔥":[
{name:"Slope",url:"https://slopegame.io"},
{name:"Subway Surfers",url:"https://subwaysurfersgame.io"},
{name:"Run 3",url:"https://run3.io"},
{name:"1v1.LOL",url:"https://1v1.lol"}
],

"Shooting 🔫":[
{name:"Krunker",url:"https://krunker.io"},
{name:"Shell Shockers",url:"https://shellshock.io"}
],

"Sports 🏀":[
{name:"Basketball Stars",url:"https://basketball-stars.co"},
{name:"Soccer Skills",url:"https://soccerskills.io"}
],

"Driving 🚗":[
{name:"Drift Hunters",url:"https://drifthunters.io"},
{name:"Moto X3M",url:"https://motox3m.co"}
]

};

function showGames(){
let html="<h1>Games</h1>";

Object.keys(categories).forEach(cat=>{
html+=`<h2>${cat}</h2><div class="grid">`;

categories[cat].forEach(g=>{
html+=`<div class="card" onclick="play('${g.url}')">${g.name}</div>`;
});

html+="</div>";
});

main.innerHTML=html;
}

// FULLSCREEN GAME (WORKS BETTER)
function play(url){
let win=window.open();
win.document.write(`
<style>body{margin:0}iframe{width:100%;height:100%;border:none}</style>
<iframe src="${url}"></iframe>
`);
}

// ================= BROWSER =================
function showBrowser(){
main.innerHTML=`
<h2>Browser</h2>
<input id="url" placeholder="Search or URL" style="width:80%;padding:10px;">
<button onclick="go()">Go</button>
<iframe id="frame"></iframe>
`;
}

function go(){
let val=document.getElementById("url").value;

if(!val.startsWith("http")){
val="https://duckduckgo.com/?q="+encodeURIComponent(val);
}

document.getElementById("frame").src=proxy+btoa(val);
}

// ================= SOUNDBOARD =================
function showSound(){
main.innerHTML="<h1>Soundboard</h1><div class='grid' id='sounds'></div>";

const sounds={
"Boom":"https://www.myinstants.com/media/sounds/vine-boom.mp3",
"Pipe":"https://www.myinstants.com/media/sounds/metal-pipe.mp3",
"Airhorn":"https://www.myinstants.com/media/sounds/airhorn.mp3",
"Bruh":"https://www.myinstants.com/media/sounds/movie_1.mp3",
"Goofy":"https://www.myinstants.com/media/sounds/goofy-ahh.mp3",
"Discord":"https://www.myinstants.com/media/sounds/discord-ping.mp3",
"Bonk":"https://www.myinstants.com/media/sounds/bonk.mp3",
"Windows":"https://www.myinstants.com/media/sounds/windows-error.mp3",
"Rizz":"https://www.myinstants.com/media/sounds/rizz.mp3"
};

let s=document.getElementById("sounds");

Object.keys(sounds).forEach(name=>{
let div=document.createElement("div");
div.className="sound";
div.innerText=name;
div.onclick=()=>new Audio(sounds[name]).play();
s.appendChild(div);
});
}

</script>

</body>
</html>
