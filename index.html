<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .game {
            border: 1px solid #ccc;
            background-color: white;
            padding: 10px;
            margin-bottom: 10px;
        }
        .game button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
        .game button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Games Site</h1>
    <div class="game">
        <h2>Game 1</h2>
        <p>Description of Game 1.</p>
        <button onclick="alert('Game 1 started!')">Play Game 1</button>
    </div>
    <div class="game">
        <h2>Game 2</h2>
        <p>Description of Game 2.</p>
        <button onclick="alert('Game 2 started!')">Play Game 2</button>
    </div>
    <script>
        console.log('Games Site Loaded');
        function showAlert(gameName) {
            alert(gameName + ' started!');
        }
    </script>
</body>
</html>
