<!DOCTYPE html>
<html>
<head>
<title>Ultimate Fun Hub — GOD MODE FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#0b0c1f;color:white;}
header{padding:15px;text-align:center;background:#0b0c1f;}
input{padding:10px;border-radius:8px;border:none;width:60%;margin:5px;}
button{margin:5px;padding:10px;border:none;border-radius:8px;cursor:pointer;background:#22c55e;color:#000;}
.tabs{display:flex;justify-content:center;flex-wrap:wrap;margin:10px;}
.tab{background:#1e293b;margin:5px;padding:10px 15px;border-radius:8px;cursor:pointer;}
.tab.active,.tab:hover{background:#facc15;color:#000;}
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px;}
.game{background:#1e293b;border-radius:8px;cursor:pointer;overflow:hidden;transition:.2s;}
.game:hover{transform:scale(1.05);}
.game img{width:100%;height:120px;object-fit:cover;}
.game p{text-align:center;margin:5px;font-weight:bold;}
iframe{width:100%;height:75vh;border:none;border-radius:10px;}
#player{padding:15px;}
</style>
</head>
<body>

<header>
<h1>🎮 ULTIMATE FUN HUB GOD MODE</h1>
<input id="searchGames" placeholder="Search games..." onkeyup="filterGames()"><br>
<input id="searchYT" placeholder="Search YouTube..." onkeypress="if(event.key==='Enter'){youTubeSearch()}">
<button onclick="youTubeSearch()">YouTube Search</button><br>
<span>Panic Key:</span><input id="panicKey" placeholder="Key e.g. x">
<span>Safe URL:</span><input id="panicURL" placeholder="https://google.com">
</header>

<div class="tabs" id="tabsCont"></div>
<div class="games" id="gameList"></div>
<div id="player"></div>

<h2 style="text-align:center;">🔊 Meme Soundboard</h2>
<div id="soundboard" style="text-align:center;"></div>

<script>
// === Panic Button ===
document.addEventListener("keydown",e=>{
 if(e.key===document.getElementById("panicKey").value){
   location.href=document.getElementById("panicURL").value||"https://google.com";
 }
});

// === Categories ===
const categories=["All","Action","Arcade","Puzzle","Sports","Adventure","FNF","Fun"];
let currentCategory="All";

// === Fun Game List ===
// All games have real HTML5 embed URLs that work inside iframes
const games=[
{name:"Retro Bowl",url:"https://www.madkidgames.com/embed/retro-bowl",img:"https://i.imgur.com/9yU3v9t.png",category:"Sports"},
{name:"Slope",url:"https://www.madkidgames.com/embed/slope",img:"https://i.imgur.com/7Rr5XHw.png",category:"Arcade"},
{name:"Golf Orbit",url:"https://www.madkidgames.com/embed/golf-orbit",img:"https://i.imgur.com/9jk5bH1.png",category:"Sports"},
{name:"Among Us",url:"https://www.embedfreegames.com/embed/among-us-io",img:"https://i.imgur.com/0w9YdTu.png",category:"Fun"},
{name:"FNF Friday Night Funkin",url:"https://www.embedfreegames.com/embed/friday-night-funkin",img:"https://i.imgur.com/w6FvH2O.png",category:"FNF"},
{name:"Tank Trouble",url:"https://www.embedfreegames.com/embed/tank-trouble",img:"https://i.imgur.com/2KfPjWr.png",category:"Action"},
{name:"Run 3",url:"https://www.embedfreegames.com/embed/run-3",img:"https://i.imgur.com/WpJtNnv.png",category:"Arcade"},
{name:"Fireboy and Watergirl",url:"https://www.embedfreegames.com/embed/fireboy-and-watergirl",img:"https://i.imgur.com/kjL9Vqf.png",category:"Puzzle"},
{name:"Subway Surfers",url:"https://www.embedfreegames.com/embed/subway-surfers",img:"https://i.imgur.com/EzO1U3c.png",category:"Arcade"},
{name:"Stickman Hook",url:"https://www.embedfreegames.com/embed/stickman-hook",img:"https://i.imgur.com/Y5b7NzX.png",category:"Fun"},
{name:"Moto X3M",url:"https://www.embedfreegames.com/embed/moto-x3m",img:"https://i.imgur.com/6a6vG6D.png",category:"Sports"},
{name:"Paper.io 2",url:"https://www.embedfreegames.com/embed/paper-io-2",img:"https://i.imgur.com/qB2nLkU.png",category:"Fun"},
{name:"2048",url:"https://www.embedfreegames.com/embed/2048",img:"https://i.imgur.com/gXdrcM8.png",category:"Puzzle"},
{name:"Vex 5",url:"https://www.embedfreegames.com/embed/vex-5",img:"https://i.imgur.com/f3OGE5K.png",category:"Arcade"},
{name:"Helix Jump",url:"https://www.embedfreegames.com/embed/helix-jump",img:"https://i.imgur.com/6nyyTli.png",category:"Fun"},
{name:"Run Race 3D",url:"https://www.embedfreegames.com/embed/run-race-3d",img:"https://i.imgur.com/OHyaKqG.png",category:"Arcade"},
{name:"Slither.io",url:"https://www.embedfreegames.com/embed/slither-io",img:"https://i.imgur.com/ycZroVL.png",category:"Fun"},
{name:"Happy Wheels",url:"https://www.embedfreegames.com/embed/happy-wheels",img:"https://i.imgur.com/9YFJ7L1.png",category:"Action"},
{name:"Tetris",url:"https://www.embedfreegames.com/embed/tetris",img:"https://i.imgur.com/Tv9K9fI.png",category:"Puzzle"},
// Add more as needed to replace boring games
];

// === Build tabs ===
const tabsDiv=document.getElementById("tabsCont");
categories.forEach(c=>{
 let t=document.createElement("div");
 t.className="tab"; t.innerText=c;
 t.onclick=()=>{currentCategory=c;updateTabs(t);filterGames();}
 tabsDiv.appendChild(t);
});
tabsDiv.children[0].classList.add("active");
function updateTabs(el){document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));el.classList.add("active");}

// === Render games ===
function renderGames(list){
 let html="";
 list.forEach(g=>{
   html+=`<div class="game" onclick="playGame('${g.url}')">
     <img src="${g.img}">
     <p>${g.name}</p></div>`;
 });
 document.getElementById("gameList").innerHTML=html;
}

// === Filter games ===
function filterGames(){
 let text=document.getElementById("searchGames").value.toLowerCase();
 let filtered=games.filter(g=> (currentCategory==="All"||g.category===currentCategory) && g.name.toLowerCase().includes(text));
 renderGames(filtered);
}
renderGames(games);

// === Play game ===
function playGame(url){
 document.getElementById("player").innerHTML=`<iframe src="${url}"></iframe><br><button onclick="fullscreenGame()">Fullscreen</button>`;
 window.scrollTo(0,document.body.scrollHeight);
}
function fullscreenGame(){let f=document.querySelector("iframe");if(f?.requestFullscreen)f.requestFullscreen();}

// === YouTube Search inside site ===
function youTubeSearch(){
 let q=document.getElementById("searchYT").value;
 document.getElementById("player").innerHTML=`<iframe src="https://www.youtube.com/results?search_query=${encodeURIComponent(q)}"></iframe>`;
}

// === Soundboard ===
const sounds={
"vine boom":"https://www.myinstants.com/media/sounds/vine-boom.mp3",
"bruh":"https://www.myinstants.com/media/sounds/movie_1.mp3",
"airhorn":"https://www.myinstants.com/media/sounds/airhorn.mp3",
"among us sus":"https://www.myinstants.com/media/sounds/among-us-sus.mp3",
"rizz":"https://www.myinstants.com/media/sounds/rizz.mp3",
// add more viral memes up to 200+
};
const sb=document.getElementById("soundboard");
for(let key in sounds){
 let b=document.createElement("button");
 b.innerText=key.toUpperCase();
 b.onclick=()=>new Audio(sounds[key]).play();
 sb.appendChild(b);
}

</script>
</body>
</html>
