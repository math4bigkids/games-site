<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Site</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to the Games Site</h1>
        <div class="mode-toggle">
            <label for="toggle">Toggle Dark/Light Mode</label>
            <input type="checkbox" id="toggle" onchange="toggleTheme()">
        </div>
    </header>
    <main>
        <section class="recent-games">
            <h2>Recent Games</h2>
            <ul id="recent-game-list"></ul>
        </section>
        <section class="favorites">
            <h2>Your Favorites</h2>
            <ul id="favorite-game-list"></ul>
        </section>
        <section class="games">
            <h2>Available Games</h2>
            <ul id="game-list">
                <!-- List of games will be dynamically generated here -->
            </ul>
        </section>
        <section class="soundboard">
            <h2>Soundboard</h2>
            <ul id="soundboard-list">
                <!-- List of soundboard sounds will be dynamically generated here -->
            </ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Delilah Webe</p>
    </footer>
<script>
function toggleTheme() {
    document.body.classList.toggle('dark-mode');
}
</script>
</body>
</html>
